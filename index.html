<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SYNDUALITY Echo of Ada の素材逆引きアプリです。アイテムのレシピを検索できます。"> 
    <title>Far-East-NEST | SYNDUALITY 素材逆引きアプリ</title>

    <link rel="shortcut icon" href="favicon.ico">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-V6BSN44CQV"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

    <style>
        :root {
            --legendary: #ffcc00;
            --epic: #a335ee;
            --rare: #0070dd;
            --uncommon: #1eff00;
            --common: #ffffff;
            --bg: #0b0b0b;
            --card-bg: #1a1a1a;
            --accent: #00ffcc;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            background: var(--bg);
            color: #ddd;
            padding: 15px;
            margin: 0;
        }

        /* 検索エリア */
        .search-container {
            position: sticky;
            top: 0;
            background: var(--bg);
            padding: 10px 0 20px;
            z-index: 1000;
        }

        .search-box {
            width: 100%;
            padding: 18px;
            font-size: 16px;
            border-radius: 4px;
            border: 1px solid #333;
            box-sizing: border-box;
            background: #222;
            color: #fff;
            border-left: 4px solid var(--accent);
            outline: none;
        }

        /* カードデザイン */
        .card {
            background: var(--card-bg);
            border-radius: 4px;
            margin-bottom: 25px;
            display: none;
            overflow: hidden;
            border: 1px solid #333;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .card.show {
            display: block;
        }

        .card-header {
            padding: 20px;
            border-bottom: 1px solid #2a2a2a;
            cursor: pointer;
            transition: background 0.2s;
        }

        .card-header:hover {
            background: #252525;
        }

        /* レア度ラベル（背景塗りつぶし） */
        .rarity-label {
            display: inline-block;
            padding: 2px 10px;
            font-size: 11px;
            font-weight: 900;
            border-radius: 2px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .bg-legendary {
            background: var(--legendary);
            color: #000;
        }

        .bg-epic {
            background: var(--epic);
            color: #fff;
        }

        .bg-rare {
            background: var(--rare);
            color: #fff;
        }

        .bg-uncommon {
            background: var(--uncommon);
            color: #000;
        }

        .bg-common {
            background: #555;
            color: #fff;
        }

        .header-material-name {
            font-size: 26px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 12px;
            line-height: 1.2;
        }

        .header-info {
            font-size: 12px;
            color: #888;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .price-tag {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 2px;
            background: #000;
            font-family: monospace;
            border: 1px solid #444;
        }

        .buy-price {
            color: var(--accent);
        }

        .sell-price {
            color: #ffcc00;
        }

        .header-location {
            font-size: 13px;
            color: #aaa;
            margin-top: 10px;
        }

        .header-location b {
            color: var(--uncommon);
        }

        .header-note {
            font-size: 12px;
            color: #777;
            background: #111;
            padding: 10px;
            border-radius: 4px;
            margin-top: 15px;
            border-left: 2px solid #333;
        }

        /* リスト部分 */
        .usage-list {
            padding: 0 20px 20px;
            background: #151515;
        }

        .usage-title {
            font-size: 10px;
            color: #555;
            padding: 15px 0 10px;
            border-bottom: 1px solid #222;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .usage-item {
            display: flex;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #222;
            gap: 15px;
        }

        .rarity-tag {
            font-size: 10px;
            padding: 3px 0;
            font-weight: bold;
            border: 1px solid;
            width: 80px;
            text-align: center;
            flex-shrink: 0;
        }

        .rarity-tag.legendary {
            color: var(--legendary);
            border-color: var(--legendary);
        }

        .rarity-tag.epic {
            color: var(--epic);
            border-color: var(--epic);
        }

        .rarity-tag.rare {
            color: var(--rare);
            border-color: var(--rare);
        }

        .rarity-tag.uncommon {
            color: var(--uncommon);
            border-color: var(--uncommon);
        }

        .rarity-tag.common {
            color: #888;
            border-color: #444;
        }

        .target-name {
            font-size: 16px;
            font-weight: bold;
            color: #eee;
            cursor: pointer;
            border-bottom: 1px solid #444;
            transition: color 0.2s;
        }

        .target-name:hover {
            color: var(--accent);
        }

        .qty-area {
            margin-left: auto;
            text-align: right;
        }

        .qty-val {
            font-size: 24px;
            font-weight: 800;
            color: #fff;
            font-family: 'Arial Black', sans-serif;
        }

        .recursive-area {
            background: #0a0a0a;
            margin-top: 15px;
            padding: 15px;
            border-radius: 4px;
            display: none;
            border: 1px solid #222;
        }

        .recursive-area.active {
            display: block;
        }


        .recursive-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 10px;
            /* 左右に少し余裕を持たせる */
            border-bottom: 1px solid #1a1a1a;
            font-size: 14px;

            /* --- ここから追加 --- */
            cursor: pointer;
            /* マウスを乗せたら指マークにする */
            transition: background 0.2s;
            /* 変化をなめらかに */
            border-radius: 4px;
            /* 角を少し丸める */
        }

        .recursive-item:hover {
            background: rgba(0, 255, 204, 0.15);
            /* アクセントカラーで薄く光らせる */
            color: #fff;
            /* 文字をパキッと白くする */
        }

        .recursive-item span:first-child {
            border-bottom: 1px dashed #555;
            /* 下線を破線にして「リンク感」を出す */
        }



        /* 分解表示ボタンのスタイル */
        .expand-button {
            font-size: 11px;
            color: #00ffcc;
            /* アクセントカラー（エメラルド） */
            cursor: pointer;
            margin-top: 6px;
            display: inline-block;
            border: 1px solid #00ffcc;
            padding: 2px 8px;
            border-radius: 4px;
            transition: 0.2s;
            background: rgba(0, 255, 204, 0.1);
        }

        .expand-button:hover {
            background: rgba(0, 255, 204, 0.3);
            color: #fff;
        }

        /* 検索対象（完成品名）のスタイル */
        .target-name {
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            text-decoration: underline;
            text-decoration-color: #555;
            transition: 0.2s;
        }

        .target-name:hover {
            color: #00ffcc;
            text-decoration-color: #00ffcc;
        }
    </style>
</head>

<body>

    <div class="search-container">
        <input type="text" id="search" class="search-box" placeholder="逆引きしたいアイテム名を入力(e.g.マローダーコア)..."
            onkeyup="filter()">
    </div>

    <div id="container"></div>
    <script>
        // --- グローバル変数 ---
        let allRecipes = [];          // 全レシピのフラットなリスト
        let itemMaster = {};          // アイテムの基本情報（レア度、場所など）
        let groupedByMaterial = {};    // 「素材名」をキーにした逆引き用辞書

        /**
         * アプリの初期化：CSVを読み込んでデータを構造化する
         */
        async function init() {
            try {
                // マスターデータとレシピデータを同時に取得
                const [mRes, rRes] = await Promise.all([
                    fetch('./item_master.csv'),
                    fetch('./craft_data.csv')
                ]);

                // アイテムマスターのパース
                const mData = parseCSV(await mRes.text());
                mData.slice(1).forEach(row => {
                    if (row[0]) {
                        const rar = row[1] ? row[1].toLowerCase().trim().replace(/\s+/g, '') : 'common';
                        itemMaster[row[0]] = { rarity: rar, category: row[2], location: row[3], buy: row[4], sell: row[5], note: row[6] };
                    }
                });

                // レシピデータのパース
                const rData = parseCSV(await rRes.text());
                rData.slice(1).forEach(row => {
                    if (!row[0]) return;
                    const data = {
                        material: row[0],
                        target: row[1],
                        rarity: row[3] ? row[3].toLowerCase().trim().replace(/\s+/g, '') : 'common',
                        qty: parseInt(row[4]) || 0
                    };
                    allRecipes.push(data);
                    // 逆引き検索を高速化するために、素材名でグループ化しておく
                    if (!groupedByMaterial[data.material]) groupedByMaterial[data.material] = [];
                    groupedByMaterial[data.material].push(data);
                });
                render(); // 最初の描画を実行
            } catch (e) { console.error("Data loading error:", e); }
        }

        /**
         * シンプルなCSVパース関数（引用符に対応）
         */
        function parseCSV(text) {
            const rows = [];
            let curRow = [], curCell = '', inQuote = false;
            for (let i = 0; i < text.length; i++) {
                let c = text[i];
                if (c === '"') inQuote = !inQuote;
                else if (c === ',' && !inQuote) { curRow.push(curCell.trim()); curCell = ''; }
                else if ((c === '\n' || c === '\r') && !inQuote) {
                    if (curCell || curRow.length) { curRow.push(curCell.trim()); rows.push(curRow); }
                    curRow = []; curCell = '';
                } else curCell += c;
            }
            return rows;
        }

        /**
         * メインの描画処理：素材ごとのカードを生成する
         */
        function render() {
            const container = document.getElementById('container');
            container.innerHTML = "";

            // 素材名でソートしてループ
            Object.keys(groupedByMaterial).sort().forEach(name => {
                const items = groupedByMaterial[name];
                const m = itemMaster[name] || {};
                const rar = m.rarity || 'common';

                const card = document.createElement('div');
                card.className = 'card';
                card.setAttribute('data-name', name);

                card.innerHTML = `
            <div class="card-header" onclick="quickSearch('${name.replace(/'/g, "\\'")}')">
                <div class="rarity-label bg-${rar}">${rar}</div>
                <div class="header-material-name">${name}</div>
                <div class="header-info">
                    <span>[ ${m.category || '素材'} ]</span>
                    ${m.buy && m.buy !== "-" ? `<span class="price-tag buy-price">購入: ${m.buy}</span>` : ""}
                    ${m.sell && m.sell !== "-" ? `<span class="price-tag sell-price">売却: ${m.sell}</span>` : ""}
                </div>
                ${m.location ? `<div class="header-location">📍 入手方法: <b>${m.location}</b></div>` : ""}
                ${m.note ? `<div class="header-note">${m.note}</div>` : ""}
            </div>
            <div class="usage-list">
                <div class="usage-title">この素材から作れるアイテム（逆引き）</div>
                    ${items.map(item => `
                    <div class="usage-item">
                        <span class="rarity-tag ${item.rarity}">${item.rarity.toUpperCase()}</span>
                        <div style="flex-grow:1">
                            <div class="target-name" 
                                 onclick="quickSearch('${item.target.replace(/'/g, "\\'")}')" 
                                 title="このアイテムを材料として使うレシピを検索">
                                 ${item.target}
                            </div>
                            
                            <div class="expand-button" 
                                 onclick="toggleExpand(this, '${item.target.replace(/'/g, "\\'")}')">
                                 ▼ その他素材の詳細表示 ▼
                            </div>
                            
                            <div class="recursive-area"></div>
                        </div>
                        <div class="qty-area"><div class="qty-val">${item.qty}</div></div>
                    </div>
                `).join('')}
            </div>
        `;
                container.appendChild(card);
            });
        }

        /**
         * アコーディオン展開：完成品を末端素材まで再帰的に計算して表示する
         */
        function toggleExpand(el, target) {
            const area = el.parentElement.querySelector('.recursive-area');
            if (area.classList.toggle('active')) {
                const totals = {};
                // 再帰計算用関数
                const calc = (t, m) => {
                    const ings = allRecipes.filter(r => r.target === t);
                    // レシピがない＝これ以上分解できない末端素材
                    if (!ings.length) return totals[t] = (totals[t] || 0) + m;
                    // 材料をさらに掘り下げる
                    ings.forEach(i => calc(i.material, i.qty * m));
                };
                calc(target, 1);
                area.innerHTML = '<div style="font-size:10px; color:#555; margin-bottom:8px;">末端素材への分解合計</div>' +
                    Object.entries(totals).map(([m, q]) => `
                <div class="recursive-item" onclick="event.stopPropagation(); quickSearch('${m.replace(/'/g, "\\'")}')">
                    <span style="border-bottom:1px solid #555;">${m}</span><span style="font-weight:bold; color:var(--accent);">x${q}</span>
                </div>`).join('');
            }
        }

        /**
         * クイック検索：指定した単語を検索窓に入れてフィルタリングを実行
         */
        function quickSearch(n) {
            const searchInput = document.getElementById('search');
            searchInput.value = n;
            filter();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        /**
         * フィルタリング：入力された文字が含まれるカードのみを表示
         */
        /**
                 * フィルタリングとソーティング：
                 * 完全一致 ＞ 前方一致 ＞ 部分一致 の順で並び替えて表示する
                 */
        function filter() {
            const query = document.getElementById('search').value.toLowerCase().trim();
            const container = document.getElementById('container');
            const cards = Array.from(document.querySelectorAll('.card'));

            if (query === "") {
                cards.forEach(c => c.classList.remove('show'));
                return;
            }

            // 各カードに「一致スコア」を付けて判定
            const results = cards.map(card => {
                const name = card.getAttribute('data-name').toLowerCase();
                let score = 0;

                if (name === query) {
                    score = 3; // 完全一致
                } else if (name.startsWith(query)) {
                    score = 2; // 前方一致
                } else if (name.includes(query)) {
                    score = 1; // 部分一致（含まれる）
                }

                return { card, score };
            });

            // スコアがあるものだけを表示し、スコア順 ＞ 名前順 で並び替える
            results
                .filter(res => res.score > 0)
                .sort((a, b) => {
                    if (b.score !== a.score) return b.score - a.score; // スコアが高い順
                    return a.card.getAttribute('data-name').localeCompare(b.card.getAttribute('data-name')); // 同じスコアなら名前順
                })
                .forEach(res => {
                    res.card.classList.add('show');
                    container.appendChild(res.card); // DOM上の順番を入れ替える
                });

            // スコアが0のものは隠す
            results.filter(res => res.score === 0).forEach(res => res.card.classList.remove('show'));
        }

        // アプリ起動
        init();
    </script>

    <footer style="text-align:center; padding:20px 0; color:#555; font-size:12px;">
        <div>© 2026 Far-East-NEST | データ提供: SYNDUALITY 素材逆引きアプリ</div>
        <div style="margin-top:5px;">このサイトは非公式のファンサイトです。ゲームとは一切関係ありません。</div>
    </footer>
</body>

</html>
